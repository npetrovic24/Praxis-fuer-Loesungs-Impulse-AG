<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0099A8"/>
      <stop offset="100%" stop-color="#00B4C5"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="white" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="800" height="480" rx="16" fill="url(#bg)"/>
  <rect width="800" height="480" rx="16" fill="url(#grid)"/>
  <rect width="800" height="480" rx="16" fill="url(#dots)"/>
  <circle cx="120" cy="100" r="60" fill="none" stroke="white" stroke-width="1" opacity="0.04"/>
  <circle cx="120" cy="100" r="40" fill="none" stroke="white" stroke-width="0.5" opacity="0.03"/>
  <circle cx="680" cy="380" r="80" fill="none" stroke="white" stroke-width="1" opacity="0.04"/>
  <circle cx="680" cy="380" r="50" fill="none" stroke="white" stroke-width="0.5" opacity="0.03"/>

  <!-- Case Management: Clipboard with connected people -->
  <g transform="translate(400, 240)" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Clipboard body -->
    <rect x="-55" y="-85" width="110" height="150" rx="8" stroke-width="3" opacity="0.9"/>
    <!-- Clipboard clip -->
    <rect x="-20" y="-95" width="40" height="18" rx="4" stroke-width="2.5" opacity="0.9"/>
    <circle cx="0" cy="-86" r="5" stroke-width="2" opacity="0.7"/>
    
    <!-- Central person (on clipboard) -->
    <circle cx="0" cy="-45" r="12" stroke-width="2.5" opacity="0.85"/>
    <path d="M-18,-24 Q-18,-12 0,-8 Q18,-12 18,-24" stroke-width="2.5" opacity="0.85"/>
    
    <!-- Checkmark lines -->
    <line x1="-35" y1="5" x2="-25" y2="5" stroke-width="2.5" opacity="0.5"/>
    <polyline points="-35,5 -32,8 -25,0" stroke-width="2" opacity="0.6"/>
    <line x1="-15" y1="5" x2="35" y2="5" stroke-width="2" opacity="0.35"/>
    
    <line x1="-35" y1="25" x2="-25" y2="25" stroke-width="2.5" opacity="0.5"/>
    <polyline points="-35,25 -32,28 -25,20" stroke-width="2" opacity="0.6"/>
    <line x1="-15" y1="25" x2="35" y2="25" stroke-width="2" opacity="0.35"/>
    
    <line x1="-35" y1="45" x2="-25" y2="45" stroke-width="2.5" opacity="0.5"/>
    <rect x="-36" y="40" width="12" height="12" rx="2" stroke-width="1.5" opacity="0.35"/>
    <line x1="-15" y1="45" x2="25" y2="45" stroke-width="2" opacity="0.35"/>
    
    <!-- Connected satellite people -->
    <!-- Top-left -->
    <circle cx="-85" cy="-70" r="9" stroke-width="2" opacity="0.6"/>
    <path d="M-97,-55 Q-97,-47 -85,-44 Q-73,-47 -73,-55" stroke-width="2" opacity="0.6"/>
    <line x1="-55" y1="-55" x2="-75" y2="-60" stroke-width="1.5" opacity="0.3"/>
    
    <!-- Top-right -->
    <circle cx="85" cy="-70" r="9" stroke-width="2" opacity="0.6"/>
    <path d="M73,-55 Q73,-47 85,-44 Q97,-47 97,-55" stroke-width="2" opacity="0.6"/>
    <line x1="55" y1="-55" x2="75" y2="-60" stroke-width="1.5" opacity="0.3"/>
    
    <!-- Bottom-left -->
    <circle cx="-90" cy="30" r="9" stroke-width="2" opacity="0.6"/>
    <path d="M-102,45 Q-102,53 -90,56 Q-78,53 -78,45" stroke-width="2" opacity="0.6"/>
    <line x1="-55" y1="20" x2="-80" y2="28" stroke-width="1.5" opacity="0.3"/>
    
    <!-- Bottom-right -->
    <circle cx="90" cy="30" r="9" stroke-width="2" opacity="0.6"/>
    <path d="M78,45 Q78,53 90,56 Q102,53 102,45" stroke-width="2" opacity="0.6"/>
    <line x1="55" y1="20" x2="80" y2="28" stroke-width="1.5" opacity="0.3"/>
    
    <!-- Connection dots -->
    <circle cx="-68" cy="-58" r="2" fill="white" opacity="0.3"/>
    <circle cx="68" cy="-58" r="2" fill="white" opacity="0.3"/>
    <circle cx="-70" cy="25" r="2" fill="white" opacity="0.25"/>
    <circle cx="70" cy="25" r="2" fill="white" opacity="0.25"/>
  </g>
</svg>
